name: Rebound Scanner

on:
  #schedule:
    #- cron: '30 7 * * 1-5'  # 平日 16:30 JST
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas pandas_ta requests
      - name: Run Scanner
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python rebound_hunter.py
      - name: Commit selected_positions_rebound.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f selected_positions_rebound.json ]; then
            git add selected_positions_rebound.json
            if ! git diff --cached --quiet; then
              git commit -m "Update selected_positions_rebound [skip ci]"
              git push
            fi
          fi
